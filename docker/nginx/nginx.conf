worker_processes auto;
worker_rlimit_nofile 8192;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 4096;
    multi_accept off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    log_format mdlbot_json escape=json
        '{"time":"$time_iso8601",'
        '"request_id":"$request_id",'
        '"remote_addr":"$remote_addr",'
        '"host":"$host",'
        '"method":"$request_method",'
        '"uri":"$log_safe_uri",'
        '"status":$status,'
        '"request_bytes":$request_length,'
        '"response_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"session_id":"$upstream_http_x_mdlbot_session_id",'
        '"link_id":"$upstream_http_x_mdlbot_link_id",'
        '"file_id":"$upstream_http_x_mdlbot_file_id",'
        '"user_id":"$upstream_http_x_mdlbot_user_id",'
        '"range":"$http_range",'
        '"user_agent":"$http_user_agent"}';

    map $time_iso8601 $log_day {
        ~^([0-9]{4}-[0-9]{2}-[0-9]{2}) $1;
        default unknown;
    }

    map $request_uri $log_safe_uri {
        ~^/d/ /d/[redacted];
        ~^/(watch|listen|stream|hls)/ /$1/[redacted];
        ~^/telegram/webhook/ /telegram/webhook/[redacted];
        default $uri;
    }

    access_log /dev/stdout mdlbot_json;
    access_log /var/log/mdlbot/access-$log_day.json mdlbot_json;
    open_log_file_cache max=10 inactive=24h valid=1m min_uses=1;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 500;
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 60s;
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    large_client_header_buffers 2 8k;
    server_tokens off;
    absolute_redirect off;
    port_in_redirect off;
    reset_timedout_connection on;
    max_ranges 1;

    client_body_temp_path /run/nginx/client_temp;
    proxy_temp_path /run/nginx/proxy_temp;
    fastcgi_temp_path /run/nginx/fastcgi_temp;
    uwsgi_temp_path /run/nginx/uwsgi_temp;
    scgi_temp_path /run/nginx/scgi_temp;

    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook_per_ip:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;
    limit_req_status 429;
    limit_conn_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    include /run/nginx/conf.d/*.conf;
}
